name: Build and attach Windows EXE on push

on:
  push:
    branches:
      - main
      - master
      - 'release/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Windows distributables
        run: npm run dist:win

      - name: Create or update rolling release
        uses: ncipollo/release-action@v1
        with:
          tag: nightly
          name: Nightly Build (latest push)
          body: |
            このリリースは push ごとに自動更新されます。
            - 生成物: NSISインストーラー EXE / ポータブル EXE
            - コミット: ${{ github.sha }}
          allowUpdates: true
          makeLatest: true
          removeArtifacts: true
          artifacts: |
            dist/*.exe
            dist/latest*.yml
